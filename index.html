<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GWeather - どこでも天気予報</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0077b6;
            --accent-color: #ffb703;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .search-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #address-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 200px;
        }

        #search-btn {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        #search-btn:hover {
            background-color: #005f87;
        }

        .location-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        /* 17時降水確率の強調表示 */
        .special-info {
            display: none;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .special-info h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .special-info .prob-val {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
        }

        /* グラフレイアウト */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .chart-wrapper {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 350px;
        }

        .chart-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            color: #555;
            font-size: 1.1rem;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #666;
            display: none;
        }

        #error-msg {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>GWeather</h1>
            <p class="subtitle">住所を入力して、その場所の天気を表示します</p>
        </header>

        <div class="search-container">
            <input type="text" id="address-input" placeholder="住所、地名、駅名など (例: 岩国市, 東京都新宿区)" aria-label="住所入力">
            <button id="search-btn">検索</button>
        </div>

        <div id="error-msg"></div>
        <div id="loading" class="loading">情報を取得中...</div>
        <div id="location-display" class="location-info"></div>

        <!-- 17時の強調表示 -->
        <div id="special-17h" class="special-info">
            <h2>📅 今日の17時頃の降水確率</h2>
            <div id="prob-17h" class="prob-val">--%</div>
            <div id="prob-desc">情報を取得してください</div>
        </div>
        
        <main id="main-content">
            <div class="charts-container">
                <div class="chart-wrapper">
                    <div class="chart-title">🌡️ 気温 (℃)</div>
                    <div class="canvas-container"><canvas id="tempChart"></canvas></div>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-title">☔ 降水確率 (%)</div>
                    <div class="canvas-container"><canvas id="rainChart"></canvas></div>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-title">💧 降水量 (mm)</div>
                    <div class="canvas-container"><canvas id="precipChart"></canvas></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let charts = {};

        document.addEventListener('DOMContentLoaded', () => {
            const addressInput = document.getElementById('address-input');
            const searchBtn = document.getElementById('search-btn');
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            const locationDisplay = document.getElementById('location-display');
            const special17h = document.getElementById('special-17h');
            const prob17hText = document.getElementById('prob-17h');
            const probDescText = document.getElementById('prob-desc');

            // 前回検索した場所を読み込む
            const savedAddress = localStorage.getItem('last_address');
            if (savedAddress) {
                addressInput.value = savedAddress;
                searchWeather(savedAddress);
            }

            searchBtn.addEventListener('click', () => {
                const address = addressInput.value.trim();
                if (address) {
                    searchWeather(address);
                }
            });

            addressInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const address = addressInput.value.trim();
                    if (address) searchWeather(address);
                }
            });

            async function searchWeather(address) {
                errorMsg.style.display = 'none';
                loading.style.display = 'block';
                locationDisplay.style.display = 'none';
                special17h.style.display = 'none';

                try {
                    // 1. ジオコーディング (地名 -> 座標)
                    const geoURL = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(address)}&count=1&language=ja&format=json`;
                    const geoRes = await fetch(geoURL);
                    const geoData = await geoRes.json();

                    if (!geoData.results || geoData.results.length === 0) {
                        throw new Error('場所が見つかりませんでした。別の言葉で試してください。');
                    }

                    const location = geoData.results[0];
                    const lat = location.latitude;
                    const lon = location.longitude;
                    const locationName = `${location.name}${location.admin1 ? ', ' + location.admin1 : ''}${location.country ? ' (' + location.country + ')' : ''}`;
                    
                    locationDisplay.textContent = `📍 現在の表示: ${locationName} (緯度:${lat.toFixed(2)}, 経度:${lon.toFixed(2)})`;
                    locationDisplay.style.display = 'block';
                    localStorage.setItem('last_address', address);

                    // 2. 天気データ取得
                    const weatherURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,precipitation&timezone=Asia%2FTokyo`;
                    const weatherRes = await fetch(weatherURL);
                    const weatherData = await weatherRes.json();

                    renderGraphs(weatherData);
                    updateSpecial17h(weatherData);

                } catch (error) {
                    console.error(error);
                    errorMsg.textContent = error.message;
                    errorMsg.style.display = 'block';
                } finally {
                    loading.style.display = 'none';
                }
            }

            function updateSpecial17h(data) {
                const hourly = data.hourly;
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];
                const targetTimeStr = `${todayStr}T17:00`;
                
                const idx = hourly.time.findIndex(t => t === targetTimeStr);
                if (idx !== -1) {
                    const prob = hourly.precipitation_probability[idx];
                    prob17hText.textContent = `${prob}%`;
                    
                    let desc = "傘の準備を確認しましょう。";
                    if (prob < 30) desc = "雨の心配は少なそうです。";
                    else if (prob >= 70) desc = "雨が降る可能性が高いです。傘を忘れずに。";
                    
                    probDescText.textContent = desc;
                    special17h.style.display = 'block';
                }
            }

            function renderGraphs(data) {
                const hourly = data.hourly;
                
                // 現在時刻 (JST) 以降のデータを検索
                const nowJST = new Date(Date.now() + 9 * 60 * 60 * 1000);
                const currentIsoJST = nowJST.toISOString().slice(0, 16);
                
                let startIndex = hourly.time.findIndex(t => t >= currentIsoJST);
                if (startIndex === -1) startIndex = 0;

                const count = 24;
                const endIndex = Math.min(startIndex + count, hourly.time.length);

                const labels = [];
                const temps = [];
                const probs = [];
                const precips = [];

                for (let i = startIndex; i < endIndex; i++) {
                    const timeStr = hourly.time[i];
                    const dateObj = new Date(timeStr);
                    const hour = dateObj.getHours();
                    const day = dateObj.getDate();
                    
                    let label = `${hour}:00`;
                    if (hour === 0 || i === startIndex) {
                        label = `${day}日 ${hour}:00`;
                    }
                    labels.push(label);
                    temps.push(hourly.temperature_2m[i]);
                    probs.push(hourly.precipitation_probability[i]);
                    precips.push(hourly.precipitation[i]);
                }

                const commonOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                };

                // 各グラフを描画（既存のグラフがあれば破棄して再作成）
                drawChart('tempChart', 'line', labels, '気温', temps, '#ffb703', 'rgba(255, 183, 3, 0.2)', '℃');
                drawChart('rainChart', 'bar', labels, '降水確率', probs, '#0077b6', '#0077b6', '%', { min: 0, max: 100 });
                drawChart('precipChart', 'bar', labels, '降水量', precips, '#4cc9f0', '#4cc9f0', 'mm', { min: 0 });
            }

            function drawChart(id, type, labels, label, data, color, bgColor, unit, scaleOpts = {}) {
                if (charts[id]) {
                    charts[id].destroy();
                }

                const ctx = document.getElementById(id).getContext('2d');
                charts[id] = new Chart(ctx, {
                    type: type,
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: data,
                            borderColor: color,
                            backgroundColor: bgColor,
                            borderWidth: 2,
                            tension: 0.3,
                            fill: type === 'line',
                            borderRadius: type === 'bar' ? 4 : 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                ...scaleOpts,
                                title: { display: true, text: unit }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
